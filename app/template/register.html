{% extends 'base.html' %}

{% block title %}
Регистрация
{% endblock %}

{% block body %}
<div class="container"> 
    <form action="{% if admin %}{{ url_for('main.ggbb') }}{% else %}{{ url_for('main.register') }}{% endif %}" class="box" method="post">
        <div class="field">
            <label class="label">Имя пользователя</label>
            <div class="control">
                <input class="input" type="text" placeholder="Введите имя пользователя" name="username">
            </div>
        </div>
        <div class="field">
            <label class="label">Пароль</label>
            <div class="control">
                <input class="input" type="password" placeholder="Введите пароль" name="password">
            </div>
        </div>
        {% if admin %}
            <div class="field">
                <label class="label">Администратор</label>
                <div class="control">
                    <input type="checkbox" placeholder="Администратор" name="status">
                </div>
            </div>
        {% endif %}
        <button class="button is-primary">Зарегистрироваться</button>
    </form>
</div>
{% endblock %}
