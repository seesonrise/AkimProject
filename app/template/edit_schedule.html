{% extends 'base.html' %}

{% block body %}
<div class="container">
    <h1>Редактировать расписание для {{ schedule.trainee.username }}</h1>
    <form method="POST">
        <div class="form-group">
            <label for="day_of_week">День недели:</label>
            <select name="day_of_week" id="day_of_week" required>
                <option value="Monday" {% if schedule.day_of_week == 'Monday' %}selected{% endif %}>Понедельник</option>
                <option value="Tuesday" {% if schedule.day_of_week == 'Tuesday' %}selected{% endif %}>Вторник</option>
                <option value="Wednesday" {% if schedule.day_of_week == 'Wednesday' %}selected{% endif %}>Среда</option>
                <option value="Thursday" {% if schedule.day_of_week == 'Thursday' %}selected{% endif %}>Четверг</option>
                <option value="Friday" {% if schedule.day_of_week == 'Friday' %}selected{% endif %}>Пятница</option>
                <option value="Saturday" {% if schedule.day_of_week == 'Saturday' %}selected{% endif %}>Суббота</option>
                <option value="Sunday" {% if schedule.day_of_week == 'Sunday' %}selected{% endif %}>Воскресенье</option>
            </select>
        </div>
        <div class="form-group">
            <label for="start_time">Время начала:</label>
            <input type="time" name="start_time" id="start_time" value="{{ schedule.start_time.strftime('%H:%M') }}" required>
        </div>
        <div class="form-group">
            <label for="end_time">Время окончания:</label>
            <input type="time" name="end_time" id="end_time" value="{{ schedule.end_time.strftime('%H:%M') }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Обновить</button>
        <a href="{{ url_for('profile.user_profile') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
